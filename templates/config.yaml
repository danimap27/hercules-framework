# =============================================================================
# config.yaml — TEMPLATE
# Copy this file to your project root and fill in your own values.
# Every key used by manager.py, runner.py, and generate_tables.py is documented.
# =============================================================================

# ── Identity ──────────────────────────────────────────────────────────────────
experiment_name: "my_experiment"   # shown in the HUB header
conda_env: "experiment"            # conda environment name on Hercules
slurm_script: "core/slurm_generic.sh"  # path to slurm_generic.sh

# ── Output ────────────────────────────────────────────────────────────────────
output_dir: "./results"            # where runner.py writes CSV results
tables_dir: "./paper/tables"       # where generate_tables.py writes .tex files

# ── Experiment parameters ─────────────────────────────────────────────────────
# Define the dimensions of your sweep.
# runner.py builds the cartesian product and generates one command per combination.

seeds: [0, 42, 123, 456, 789]

# Example: model variants
models:
  - name: "model_a"
    label: "Model A"
  - name: "model_b"
    label: "Model B"

# Example: hyperparameter sweep
learning_rates: [0.001, 0.01, 0.1]

# ── SLURM phases ──────────────────────────────────────────────────────────────
# A phase is a named subset of the full cartesian product.
# manager.py submits each phase as a separate SLURM array job.
# Phases can be chained with sequential SLURM dependencies via [F] Full Pipeline.

phases:
  - id: "1"
    name: "baseline"
    file: "cmds_1_baseline.txt"     # generated by runner.py --export-commands
    description: "Phase 1 — Baseline runs"
    # Optional: filters applied when generating commands for this phase
    filters:
      model: "model_a"

  - id: "2"
    name: "ablation"
    file: "cmds_2_ablation.txt"
    description: "Phase 2 — Ablation study"
    filters:
      model: "model_b"

# Expected total (for progress % in monitor)
# = len(seeds) × len(models) × len(learning_rates)
expected_runs: 30

# ── Results configuration ─────────────────────────────────────────────────────
results:
  file_pattern: "*.csv"            # glob pattern for result files inside output_dir/*/
  group_by: ["model"]              # columns to group by in the monitor summary
  metrics: ["accuracy", "loss"]    # columns to show in the summary

# ── LaTeX display labels ──────────────────────────────────────────────────────
# Keys must match the column values in your CSV output.
labels:
  model:
    model_a: "\\textsc{Model A}"
    model_b: "\\textsc{Model B}"

# ── LaTeX tables ──────────────────────────────────────────────────────────────
# Each entry produces one .tex file in tables_dir.
# generate_tables.py reads results CSVs and fills in the values.
tables:
  - name: "tab_main"
    caption: "Main results: accuracy and loss across models and seeds."
    label: "tab:main"
    rows: "model"       # iterate row groups over this CSV column
    # cols: "lr"        # optional: add a column dimension
    metrics:
      - column: "accuracy"
        label: "Acc~(\\%)"
        pct: true
      - column: "loss"
        label: "Loss"
        pct: false
